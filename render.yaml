    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx prisma db seed
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: postgresql://postgres.xzppnfbxwjofrwteftka:*Gogoi262682%23@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true&connection_limit=4
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
